spring:
  application:
    name: synq-backend
  # 기본 활성 프로파일은 local(개발 편의). 운영 등 비-dev 환경은 SPRING_PROFILES_ACTIVE 를 명시적으로 지정한다.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    # 로컬 기본값은 docker-compose.yml 의 postgres 설정과 동일.
    # 운영 등에서는 환경변수(DB_URL/DB_USERNAME/DB_PASSWORD)로 주입한다. 비밀정보 커밋 금지.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/synq}
    username: ${DB_USERNAME:synq}
    password: ${DB_PASSWORD:synq}
    hikari:
      # HNSW 는 후보를 먼저 뽑고 WHERE 를 나중에 적용한다. 청크 검색은 항상 project_id 로
      # 거르므로, 켜두지 않으면 결과가 topK 보다 적게 나올 수 있다.
      connection-init-sql: SET hnsw.iterative_scan = strict_order
  http:
    client:
      # 연결 자체가 안되는 상황을 빨리 감지.
      connect-timeout: 5s
      read-timeout: 60s
  flyway:
    enabled: true
    out-of-order: true
  jpa:
    hibernate:
      # 스키마는 Flyway 가 만든다. Hibernate 는 엔티티-스키마 불일치를 검증만 한다.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: 30
  refresh-token-expiration-days: 14

project:
  invitation:
    frontend-base-url: ${FRONTEND_BASE_URL:https://synq.app}
    expiration-days: 7

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}
  client-secret: ${KAKAO_CLIENT_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com/v1beta
  embedding:
    model: gemini-embedding-001
    dimensions: 768
    batch-size: 100
    max-attempts: 3
    initial-backoff-millis: 1000
    backoff-multiplier: 4

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html      # 접속 주소: http://localhost:8080/swagger-ui.html
  api-docs:
    path: /v3/api-docs          # JSON 스펙: http://localhost:8080/v3/api-docs

openai:
  # 실제 키는 OPENAI_API_KEY 환경변수로 주입한다.
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-5.4-nano}
  timeout: ${OPENAI_TIMEOUT:30s}

# 모든 환경에서 필요한 값이라 프로파일 밖에 둔다.
# 기본값은 임의로 잡은 출발점이고, local 전용 /local/rag/search 로 튜닝한다.
ai:
  rag:
    search:
      top-k: ${AI_RAG_SEARCH_TOP_K:5}
      min-similarity: ${AI_RAG_SEARCH_MIN_SIMILARITY:0.5}

---
# local(dev) 전용 편의 설정
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

ai:
  summary:
    # Mock 구현체는 local/test에서만 활성화된다. 실제 OpenAI 호출 확인 시 openai로 변경한다.
    client: ${AI_SUMMARY_CLIENT:fake}
    # Live Context까지 생성된 뒤 회의 후 요약 입력으로 사용할 때 live-context로 변경한다.
    context-source: ${AI_SUMMARY_CONTEXT_SOURCE:mock}
  live-context:
    # local/test에서는 Fake 구현체로 전사 이벤트와 영속 흐름을 검증한다.
    client: ${AI_LIVE_CONTEXT_CLIENT:fake}

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-please-override-in-production-env}

kakao:
  client-id: ${KAKAO_CLIENT_ID:local-dev-placeholder-kakao-client-id}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/login/callback}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
