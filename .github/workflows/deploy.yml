name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  continuous-integration:
    name: 1. Continuous Integration (Test & Build)
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. JDK 17 및 Gradle 환경 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle 실행 권한 부여
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. 테스트 실행 (실패 시 배포 차단)
      - name: Run Test Suites
        run: ./gradlew test

      # 5. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Docker Hub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Docker 이미지 생성 후 Docker Hub로 Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/synq-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/synq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  continuous-deployment:
    name: 2. Continuous Deployment (Execute Blue-Green)
    runs-on: ubuntu-latest
    needs: continuous-integration

    steps:
      # 8. 소스 코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 9. 인프라 파일 서버로 전송
      - name: Copy Infrastructure Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/"
          target: "/home/ubuntu/synq"
          strip_components: 0

      # 10. 서버에 SSH 접속하여 배포 스크립트 실행
      - name: Connect to EC2 Server and Execute Deploy Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/synq
            chmod +x infra/deploy.sh
            ./infra/deploy.sh